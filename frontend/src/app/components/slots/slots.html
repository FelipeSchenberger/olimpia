<section id="turnos" class="slots-section container">
  <div class="section-header">
      <h2 class="section-title">Turnos <span class="text-gradient">Libres</span></h2>
      <div class="date-navigator">
          <button class="nav-arrow" (click)="previousDay()" aria-label="Día anterior">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/>
              </svg>
          </button>
          <div class="date-display-wrapper">
            <div class="date-display" (click)="toggleCalendar()">
                <span class="date-text">{{ getFormattedDate() }}</span>
            </div>

            <!-- Custom Calendar Dropdown -->
            <div class="custom-calendar" *ngIf="showCalendar">
              <div class="calendar-header">
                <button (click)="prevMonth()">&lt;</button>
                <span>{{ calendarTitle }}</span>
                <button (click)="nextMonth()">&gt;</button>
              </div>
              <div class="calendar-weekdays">
                <span *ngFor="let day of weekDays">{{ day }}</span>
              </div>
              <div class="calendar-grid">
                <div 
                  *ngFor="let day of calendarDays" 
                  class="calendar-day" 
                  [class.current-month]="day.isCurrentMonth"
                  [class.today]="day.isToday"
                  [class.selected]="day.isSelected"
                  (click)="selectCalendarDate(day)">
                  {{ day.day }}
                </div>
              </div>
            </div>
          </div>
          <button class="nav-arrow" (click)="nextDay()" aria-label="Día siguiente">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/>
              </svg>
          </button>
      </div>
  </div>
  
  <div class="loading-container" *ngIf="isLoading">
      <div class="spinner"></div>
      <p>Cargando disponibilidad...</p>
  </div>

  <div class="slots-grid-compact" *ngIf="!isLoading">
      <button 
          *ngFor="let slot of slots; let i = index" 
          class="slot-btn" 
          [style.animation-delay]="i * 50 + 'ms'"
          [class.available]="slot.status === 'AVAILABLE'"
          [class.booked]="slot.status !== 'AVAILABLE'"
          [disabled]="slot.status !== 'AVAILABLE'"
          (click)="reservar(slot)">
          
          <span class="time">{{ slot.startTime }}</span>
          <span class="status-text">{{ slot.status === 'AVAILABLE' ? 'LIBRE' : 'OCUPADO' }}</span>
      </button>
  </div>

  <div *ngIf="!isLoading && slots.length === 0" class="no-slots">
      <p>No hay horarios disponibles para esta fecha.</p>
  </div>
</section>
